AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bastion host environment with isolation security group.
  Includes incident response (IR) playbook comments.

Parameters:
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name

  EnvironmentType:
    Description: "Specify which env to run in"
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH
    Type: AWS::EC2::KeyPair::KeyName

Mappings:
  EnvironmentTypeToInstanceType:
    dev:
      InstanceType: t2.nano
    test:
      InstanceType: t2.micro
    prod:
      InstanceType: t2.small

Resources:

  ###########################################################
  # INCIDENT RESPONSE PLAYBOOK STEPS (COMMENTS ONLY)
  #
  # 1. CONTAINMENT: Immediately isolate the bastion host
  #    - Apply the isolation security group (below)
  #    - Remove all inbound + outbound rules
  #
  # 2. ERADICATION: Disable user access, revoke keys, stop SSH
  #
  # 3. RECOVERY: Deploy replacement instance, analyze logs/S3
  #
  # 4. LESSONS LEARNED: Update IR playbook, adjust IAM roles
  #
  ###########################################################

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: BastionVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: BastionIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Ref AvailabilityZone
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: BastionSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: BastionRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref PublicSubnet

  ###########################################################
  # ISOLATION SECURITY GROUP
  #
  # INCIDENT RESPONSE ACTION:
  # - Applying this SG isolates the host from all traffic.
  # - Use this during a compromise to instantly contain threats.
  #
  ###########################################################

  IsolationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "IR Isolation SG - No ingress or egress"
      VpcId: !Ref VPC
      SecurityGroupIngress: []
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: BastionIsolationSG

  ###########################################################
  # STANDARD SECURITY GROUP (Optional – SSH access)
  ###########################################################
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group allowing SSH to bastion"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: BastionSG

  ###########################################################
  # BASTION INSTANCE
  # NOTE: To “contain” the instance during IR, switch the
  #       SecurityGroupIds to: !Ref IsolationSecurityGroup
  ###########################################################

  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !FindInMap [EnvironmentTypeToInstanceType, !Ref EnvironmentType, InstanceType]
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref BastionSecurityGroup
      Tags:
        - Key: Name
          Value: BastionHost

Outputs:
  BastionPublicIP:
    Description: Bastion Public IP
    Value: !GetAtt BastionHost.PublicIp

  BastionInstanceId:
    Description: Bastion Instance ID
    Value: !Ref BastionHost

  IsolationSecurityGroupId:
    Description: ID of the IR isolation security group
    Value: !Ref IsolationSecurityGroup
