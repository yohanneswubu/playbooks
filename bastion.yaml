AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for a single-instance bastion host'
Parameters:
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
  EnvironmentType:
    Description: "Specify which env to run in"
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
  LatestAmiId:
    Type:  'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH
    Type: AWS::EC2::KeyPair::KeyName

Mappings:
  EnvironmentTypeToInstanceType:
    dev:
      InstanceType: t2.nano
    test:
      InstanceType: t2.micro
    prod:
      InstanceType: t2.small

Resources:
  VPC:
    Type: AWS::EC2::VPC
    DeletionPolicy: Retain
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    DeletionPolicy: Retain
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    DeletionPolicy: Retain
    Properties:
      VpcId:
        Ref: VPC
      InternetGatewayId:
        Ref: InternetGateway
  Subnet10:
    Type: AWS::EC2::Subnet
    DeletionPolicy: Retain
    Properties:
      AvailabilityZone:
        Ref: AvailabilityZone
      VpcId:
        Ref: VPC
      CidrBlock: 10.0.10.0/24
      MapPublicIpOnLaunch: true
  RouteTable:
    Type: AWS::EC2::RouteTable
    DeletionPolicy: Retain
    Properties:
      VpcId:
        Ref: VPC
  InternetRoute:
    Type: AWS::EC2::Route
    DeletionPolicy: Retain
    DependsOn: InternetGateway
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId:
        Ref: InternetGateway
      RouteTableId:
        Ref: RouteTable
  Subnet10RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    DeletionPolicy: Retain
    Properties:
      RouteTableId:
        Ref: RouteTable
      SubnetId:
        Ref: Subnet10

  # ===========================================================================
  # INCIDENT RESPONSE PLAYBOOK — Bastion Host Containment
  #
  # Scenario: Anomalous network activity detected on the bastion host through
  #           automated monitoring (e.g., unexpected outbound connections,
  #           unusual traffic volume, or suspicious findings in VPC Flow Logs
  #           or GuardDuty).
  #
  # STEP 1 — VERIFY & TRIAGE
  #   Confirm the alert and identify the instance and its current security groups:
  #      aws ec2 describe-instances \
  #        --filters "Name=tag:Name,Values=BastionInstance" \
  #        --query "Reservations[].Instances[].{ID:InstanceId,SGs:SecurityGroups}"
  #
  # STEP 2 — ISOLATE
  #   Remove all existing security groups and apply ONLY the IsolationSecurityGroup
  #   to immediately cut off all inbound and outbound traffic:
  #      aws ec2 modify-instance-attribute \
  #        --instance-id <instance-id> \
  #        --groups <IsolationSecurityGroup-GroupId>
  #   Verify the change:
  #      aws ec2 describe-instance-attribute \
  #        --instance-id <instance-id> \
  #        --attribute groupSet
  #
  # STEP 3 — PRESERVE EVIDENCE
  #   Snapshot the root EBS volume before making any further changes:
  #      aws ec2 create-snapshot \
  #        --volume-id <root-volume-id> \
  #        --description "IR-Evidence-$(date +%Y%m%d%H%M%S)"
  #   Export VPC Flow Logs from CloudWatch or S3 for the relevant time window.
  #
  # STEP 4 — INVESTIGATE
  #   Mount the EBS snapshot on a separate isolated forensic instance.
  #   Analyse filesystem, bash history, cron jobs, /tmp, and installed packages.
  #   Cross-reference flow logs against threat intelligence feeds.
  #
  # STEP 5 — ERADICATE & RECOVER
  #   Terminate the compromised instance; do NOT attempt in-place remediation.
  #   Rotate all key pairs and IAM credentials associated with the host.
  #   Re-deploy a clean bastion from this CloudFormation template after the
  #   root cause is confirmed and remediated.
  #
  # STEP 6 — POST-INCIDENT REVIEW
  #   Document the full timeline, IOCs, and corrective actions taken.
  #   Update detection rules based on newly identified attack patterns.
  #   Schedule a lessons-learned review within 5 business days.
  # ===========================================================================

  # IsolationSecurityGroup — used during incident response containment (STEP 2).
  #
  # Completely isolates the bastion host from ALL network traffic — no inbound,
  # no outbound, no VPC-internal communication, no public Internet access.
  #
  # By omitting both SecurityGroupIngress and SecurityGroupEgress, CloudFormation
  # does NOT create the default AWS "allow all outbound" egress rule, leaving
  # the security group with an implicit deny on all traffic in both directions.
  # See: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/
  #      aws-properties-ec2-security-group.html  ("Remove the Default Rule")
  IsolationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    DeletionPolicy: Retain
    Properties:
      GroupDescription: >
        IR containment SG — no ingress or egress rules defined, so the AWS
        default allow-all-egress rule is not created. Blocks ALL traffic in
        both directions. Apply during incident response to fully isolate the
        bastion from the VPC and the public Internet.
      VpcId:
        Ref: VPC

  BastionInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    Properties:
      AvailabilityZone:
        Ref: AvailabilityZone
      ImageId:
        Ref: LatestAmiId
      InstanceType:
        Fn::FindInMap: [EnvironmentTypeToInstanceType, {Ref: EnvironmentType}, InstanceType]
      SubnetId:
        Ref: Subnet10
      # COMMENT REQUIREMENT: The InboundAccessSecurityGroup below allows shell (SSH port 22) access
      # from inside the network. During normal operations this permits authorized
      # operators already on the VPC or VPN to reach the bastion via SSH.
      # During incident response, replace this with IsolationSecurityGroup
      # to cut off all access — see IR Playbook STEP 2 above.
      SecurityGroupIds: 
        - Ref: InboundAccessSecurityGroup
      KeyName:
        Ref: KeyName

  InboundAccessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    DeletionPolicy: Retain
    Properties:
      GroupDescription: "Allow inbound tcp on SSH port from inside the VPC network"
      VpcId:
        Ref: VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 10.0.0.0/16
